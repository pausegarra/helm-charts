{{- if empty .Values.resources }}
{{- fail "resources cannot be empty" }}
{{- end }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.appName }}
spec:
  selector:
    matchLabels:
      app: {{ .Values.appName }}
  replicas: {{ .Values.replicas }}
  template:
    metadata:
      labels:
        app: {{ .Values.appName }}
    spec:
      {{- if and .Values.imagePullSecrets.enabled (gt (len .Values.imagePullSecrets.secrets) 0) }}
      imagePullSecrets:
        {{- range .Values.imagePullSecrets.secrets }}
        - name: {{ . | quote }}
        {{- end }}
      {{- end }}
      containers:
        - name: {{ default .Values.appName .Values.containerName }}
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            {{- if gt (len .Values.ports) 0 }}
            {{- range .Values.ports }}
            - containerPort: {{ default .port .containerPort }}
              protocol: {{ default "TCP" .protocol }}
              {{- with .name }}
              name: {{ . | quote }}
              {{- end }}
            {{- end }}
            {{- else }}
            - containerPort: {{ .Values.listeningPort }}
            {{- end }}
          {{- with .Values.env }}
          env:
            {{- range . }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- $probePort := .Values.listeningPort }}
          {{- if gt (len .Values.ports) 0 }}
          {{- $firstPort := index .Values.ports 0 }}
          {{- if $firstPort.containerPort }}
          {{- $probePort = $firstPort.containerPort }}
          {{- else if $firstPort.targetPort }}
          {{- $probePort = $firstPort.targetPort }}
          {{- else }}
          {{- $probePort = $firstPort.port }}
          {{- end }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            httpGet:
              path: {{ .path }}
              port: {{ default $probePort .port }}
            initialDelaySeconds: 300
            timeoutSeconds: 30
            periodSeconds: 30
            successThreshold: 1
            failureThreshold: 3
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            httpGet:
              path: {{ .path }}
              port: {{ default $probePort .port }}
            initialDelaySeconds: 30
            timeoutSeconds: 10
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
  {{ if .Values.rollingUpdate.enabled }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  {{ end }}
      
